server:
  port: 8084

spring:
  datasource:
    url: jdbc:postgresql://localhost:5432/admin_db
    username: postgres
    password: '{cipher}7ce0cd33e0f862f926f8cdcfcce67cc7258df6a4b2d77f87383cfa01a5d7cc01'
    driver-class-name: org.postgresql.Driver
  jpa:
    hibernate:
      ddl-auto: update
    show-sql: true
    properties:
      hibernate:
        dialect: org.hibernate.dialect.PostgreSQLDialect
        format_sql: true
  cloud:
    openfeign:
      circuitbreaker:
        enabled: true

jwt:
  secret: '{cipher}cb2923126505e3939cb7e704bc89450ba0d37f279bfe436c43a71d87f5b327793dd3584b2d1eaeb190e64f9c98ef98ff5f7e5a840806500b859962c0488559e94fecf3ae82cb4bf5df6cf7baa3a725660d0218a4041eb84aeeff5c001050cebd8d3807aee8ec0a1d7903f1778acc4bc6519fd29b4e7105072467b1da953f703c'
  access-token-expiry: 900000
  refresh-token-expiry: 604800000

resilience4j:
  circuitbreaker:
    instances:
      catalog-service:
        slidingWindowSize: 10
        failureRateThreshold: 50
        waitDurationInOpenState: 10s
        permittedNumberOfCallsInHalfOpenState: 3
        automaticTransitionFromOpenToHalfOpenEnabled: true
        registerHealthIndicator: true
      order-service:
        slidingWindowSize: 10
        failureRateThreshold: 50
        waitDurationInOpenState: 15s
        permittedNumberOfCallsInHalfOpenState: 3
        automaticTransitionFromOpenToHalfOpenEnabled: true
        registerHealthIndicator: true
      auth-service:
        slidingWindowSize: 10
        failureRateThreshold: 50
        waitDurationInOpenState: 10s
        permittedNumberOfCallsInHalfOpenState: 3
        automaticTransitionFromOpenToHalfOpenEnabled: true
        registerHealthIndicator: true

management:
  endpoints:
    web:
      exposure:
        include: health,circuitbreakers
  endpoint:
    health:
      show-details: always
  health:
    circuitbreakers:
      enabled: true
